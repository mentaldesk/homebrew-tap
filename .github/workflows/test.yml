name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: brew audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        # Auto-taps the checked-out repo as mentaldesk/tap.
        uses: Homebrew/actions/setup-homebrew@main

      - name: brew style
        run: brew style mentaldesk/tap

      - name: brew audit --strict --online
        run: brew audit --strict --online mentaldesk/tap/tuicode

  install:
    name: brew install (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # arm64 macOS only — Intel Macs are EOL upstream so no osx-x64 build.
        # Linux runners exercise the linux-x64 / linux-arm64 tarballs.
        runner: [macos-14, ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        # Auto-taps the checked-out repo as mentaldesk/tap.
        uses: Homebrew/actions/setup-homebrew@main

      - name: brew install
        run: brew install --verbose mentaldesk/tap/tuicode

      - name: brew test
        run: brew test mentaldesk/tap/tuicode

      - name: brew uninstall
        run: brew uninstall mentaldesk/tap/tuicode
